<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Veículos</title>
    <link rel="stylesheet" href="css/style_veiculo.css">
    <script src="js/script_veiculo.js" type="module" defer></script>
</head>

<body>

    <div id="geral">

        <h3>Cadastro de Veículos</h3>

        <div id="div-form">
            <h4>Dados do Veículo</h4>
            <form id="form-veiculo">

                <div id="linha-modelo">
                    <label for="modelo">Modelo</label>
                    <input type="text" name="modelo" id="modelo" required>
                </div>

                <div id="linha-marca">
                    <label for="marca">Marca</label>
                    <input type="text" name="marca" id="marca" required>
                </div>

                <div id="linha-placa">
                    <label for="placa">Placa</label>
                    <input type="text" name="placa" id="placa" required>
                </div>

                <div id="linha-ano">
                    <label for="ano_fabricacao">Ano</label>
                    <input type="number" name="ano_fabricacao" id="ano_fabricacao" required>
                </div>

                <div id="linha-valor">
                    <label for="valor_mercado">Valor do Veículo</label>
                    <input type="number" step="0.01" name="valor_mercado" id="valor_mercado" required>
                </div>

                <h4>Combustível</h4>
                <div id="div-radios">
                    <input type="radio" name="tipo_combustivel" id="gasolina" value="gasolina" required>
                    <label for="gasolina">Gasolina</label>
                    
                    <input type="radio" name="tipo_combustivel" id="etanol" value="etanol">
                    <label for="etanol">Etanol</label>
                    
                    <input type="radio" name="tipo_combustivel" id="bicombustivel" value="bicombustivel">
                    <label for="bicombustivel">Bicombustível</label>
                    
                    <input type="radio" name="tipo_combustivel" id="hibrido" value="hibrido">
                    <label for="hibrido">Híbrido</label>
                    
                    <input type="radio" name="tipo_combustivel" id="eletrico" value="eletrico">
                    <label for="eletrico">Elétrico</label>
                </div>

                <div id="div-botoes">
                    <button type="submit" id="btn-add">Enviar</button>
                    <button type="reset" id="btn-limpar">Limpar</button>
                </div>

            </form>
        </div>

        <div id="div-dados">

        </div>

    </div>

</body>

</html>
